  <g>
    <text x="176" y="514" class="cv">›</text><text x="196" y="514" class="sk">kickoff</text>
    <text x="176" y="546" class="cv">›</text><text x="196" y="546" class="sk">mapear</text>
    <text x="176" y="578" class="cv">›</text><text x="196" y="578" class="sk">diagramar</text>
    <text x="176" y="610" class="cv">›</text><text x="196" y="610" class="sk">roadmap</text>
    <text x="176" y="642" class="cv">›</text><text x="196" y="642" class="sk">camada-agentica</text>
    <text x="176" y="674" class="cv">›</text><text x="196" y="674" class="sk">nova-feature</text>
    <text x="176" y="706" class="cv">›</text><text x="196" y="706" class="sk">validar</text>

    <text x="470" y="514" class="cv">›</text><text x="490" y="514" class="sk">revisar-pr</text>
    <text x="470" y="546" class="cv">›</text><text x="490" y="546" class="sk">setup-ci</text>
    <text x="470" y="578" class="cv">›</text><text x="490" y="578" class="sk">metricas</text>
    <text x="470" y="610" class="cv">›</text><text x="490" y="610" class="sk">auditar</text>
    <text x="470" y="642" class="cv">›</text><text x="490" y="642" class="sk">evals</text>
    <text x="470" y="674" class="cv">›</text><text x="490" y="674" class="sk">integracoes</text>
    <text x="470" y="706" class="cv">›</text><text x="490" y="706" class="sk">handoff</text>
  </g>

