  <rect x="124" y="723" width="28" height="20" rx="4" fill="#0ea5e9"/><rect x="124" y="719" width="12" height="5" rx="2" fill="#0ea5e9"/>
  <text x="162" y="740" class="t mono" font-size="20" font-weight="700">docs/</text>
  <text x="470" y="740" class="m" font-size="17">documentação viva, por concern</text>

  <rect x="182" y="749" width="28" height="20" rx="4" fill="#22c55e"/><rect x="182" y="745" width="12" height="5" rx="2" fill="#22c55e"/>
  <text x="220" y="766" class="t mono" font-size="19" font-weight="700">product/</text>
  <text x="470" y="766" class="m" font-size="17">vision · journeys · features · MVP · roadmap</text>

  <rect x="182" y="781" width="28" height="20" rx="4" fill="#ec4899"/><rect x="182" y="777" width="12" height="5" rx="2" fill="#ec4899"/>
  <text x="220" y="798" class="t mono" font-size="19" font-weight="700">architecture/</text>
  <text x="470" y="798" class="m" font-size="17">overview (5 eixos) · context-map · diagrams · adr</text>

  <rect x="182" y="813" width="28" height="20" rx="4" fill="#14b8a6"/><rect x="182" y="809" width="12" height="5" rx="2" fill="#14b8a6"/>
  <text x="220" y="830" class="t mono" font-size="19" font-weight="700">engineering/</text>
  <text x="470" y="830" class="m" font-size="17">TESTING · metrics · integrations · agentic-layer</text>

  <!-- .github + scripts/ -->
  <rect x="124" y="847" width="28" height="20" rx="4" fill="#3b82f6"/><rect x="124" y="843" width="12" height="5" rx="2" fill="#3b82f6"/>
  <text x="162" y="864" class="t mono" font-size="20" font-weight="700">.github + scripts/</text>
  <text x="470" y="864" class="m" font-size="17">CI da esteira: auditoria + eval de fidelidade</text>

  <!-- specs/ -->
  <rect x="124" y="879" width="28" height="20" rx="4" fill="#f97316"/><rect x="124" y="875" width="12" height="5" rx="2" fill="#f97316"/>
  <text x="162" y="896" class="t mono" font-size="20" font-weight="700">specs/</text>
  <text x="470" y="896" class="m" font-size="17">feature: spec · design · domain · tasks (+ quick)</text>

  <!-- src/ -->
  <rect x="124" y="911" width="28" height="20" rx="4" fill="#64748b"/><rect x="124" y="907" width="12" height="5" rx="2" fill="#64748b"/>
  <text x="162" y="928" class="t mono" font-size="20" font-weight="700">src/</text>
  <text x="470" y="928" class="m" font-size="17">estrutura em camadas (DDD tático)</text>

  <!-- CLAUDE.md -->
  <rect x="126" y="943" width="22" height="24" rx="3" fill="#0e1430"/>
  <text x="162" y="960" class="t mono" font-size="20" font-weight="700">CLAUDE.md</text>
  <text x="470" y="960" class="m" font-size="17">regras do agente — contexto base (alwaysApply)</text>

  <!-- DIFFERENTIATORS -->
  <text x="44" y="1044" class="m" font-size="16" font-weight="700" letter-spacing="1">POR QUE É DIFERENTE</text>
  <g>
    <rect x="40"  y="1062" width="487" height="118" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="80" cy="1098" r="15" fill="#3b82f6"/>
    <text x="108" y="1105" class="t" font-size="22" font-weight="700">A esteira se valida sozinha</text>
    <text x="64" y="1141" class="m" font-size="17">Auditoria estrutural + eval de fidelidade</text>
    <text x="64" y="1163" class="m" font-size="17">spec→código rodando na CI (gate de PR).</text>

    <rect x="553" y="1062" width="487" height="118" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="593" cy="1098" r="15" fill="#7c3aed"/>
    <text x="621" y="1105" class="t" font-size="22" font-weight="700">Da ideia ao código</text>
    <text x="577" y="1141" class="m" font-size="17">Lean Inception + DDD + Technical Design</text>
    <text x="577" y="1163" class="m" font-size="17">Docs + SDD numa única esteira.</text>

    <rect x="40"  y="1192" width="487" height="118" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="80" cy="1228" r="15" fill="#f97316"/>
    <text x="108" y="1235" class="t" font-size="22" font-weight="700">MCPs com segurança</text>
    <text x="64" y="1271" class="m" font-size="17">Jira, Confluence, Notion — com trava de</text>
    <text x="64" y="1293" class="m" font-size="17">conta/workspace (não vaza no pessoal).</text>

    <rect x="553" y="1192" width="487" height="118" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="593" cy="1228" r="15" fill="#22c55e"/>
    <text x="621" y="1235" class="t" font-size="22" font-weight="700">Continuidade &amp; métricas</text>
    <text x="577" y="1271" class="m" font-size="17">STATE/handoff entre sessões + Lead Time,</text>
    <text x="577" y="1293" class="m" font-size="17">Throughput e maturidade de CD.</text>
  </g>

  <!-- FOOTER -->
  <rect x="40" y="1332" width="1000" height="76" rx="16" fill="#0e1430"/>
  <text x="72" y="1366" class="w" font-size="18" font-weight="700">Comece agora:</text>
  <text x="72" y="1392" class="mono" font-size="20" fill="#86efac">npx @igoruehara/spec-driven</text>
  <text x="1008" y="1366" class="w" font-size="16" text-anchor="end" opacity="0.7">100% open source</text>
  <text x="1008" y="1392" class="mono" font-size="16" fill="#93c5fd" text-anchor="end">github.com/igoruehara/spec-driven</text>
</svg>
