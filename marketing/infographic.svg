<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .t{fill:#1f2937} .m{fill:#64748b} .w{fill:#ffffff} .mono{font-family:Consolas,'Courier New',monospace}
      .sk{fill:#1f2937;font-family:Consolas,'Courier New',monospace;font-size:18px}
      .cv{fill:#7c3aed;font-size:16px;font-weight:700}
    </style>
  </defs>

  <rect width="1080" height="1440" fill="#eef1f7"/>

  <!-- HEADER -->
  <rect x="40" y="36" width="1000" height="190" rx="20" fill="#0e1430"/>
  <text x="72" y="108" class="w" font-size="50" font-weight="700">Spec-Driven Development</text>
  <text x="72" y="150" font-size="23" fill="#c7d2fe">uma CLI open source para estruturar o SDD no Claude Code</text>
  <text x="72" y="190" class="mono" font-size="20" fill="#93c5fd">npx @igoruehara/spec-driven</text>
  <rect x="838" y="62" width="166" height="42" rx="21" fill="#22c55e"/>
  <text x="921" y="89" class="w" font-size="18" font-weight="700" text-anchor="middle">OPEN SOURCE</text>

  <!-- METHODOLOGY FLOW -->
  <text x="44" y="262" class="m" font-size="16" font-weight="700" letter-spacing="1">DA IDEIA AO CÓDIGO, RASTREÁVEL</text>
  <g font-size="20" font-weight="700" text-anchor="middle">
    <rect x="40"  y="278" width="216" height="66" rx="12" fill="#7c3aed"/>
    <text x="148" y="312" class="w">Lean Inception</text><text x="148" y="333" class="w" font-size="13" font-weight="400">descobrir</text>
    <rect x="286" y="278" width="216" height="66" rx="12" fill="#14b8a6"/>
    <text x="394" y="312" class="w">DDD</text><text x="394" y="333" class="w" font-size="13" font-weight="400">modelar</text>
    <rect x="532" y="278" width="216" height="66" rx="12" fill="#f97316"/>
    <text x="640" y="312" class="w">TDD</text><text x="640" y="333" class="w" font-size="13" font-weight="400">desenhar</text>
    <rect x="778" y="278" width="216" height="66" rx="12" fill="#ec4899"/>
    <text x="886" y="312" class="w">SDD</text><text x="886" y="333" class="w" font-size="13" font-weight="400">implementar</text>
  </g>
  <g fill="#94a3b8" font-size="26" font-weight="700" text-anchor="middle">
    <text x="271" y="320">›</text><text x="517" y="320">›</text><text x="763" y="320">›</text>
  </g>

  <!-- STRUCTURE (hierarquia, skills expandidas) -->
  <text x="44" y="392" class="m" font-size="16" font-weight="700" letter-spacing="1">ESTRUTURA DO PROJETO — 14 SKILLS</text>
  <rect x="40" y="408" width="1000" height="592" rx="16" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- connectors -->
  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <!-- spine nivel 1 -->
    <path d="M86 460 V960"/>
    <path d="M86 476 H122"/>
    <path d="M86 734 H122"/>
    <path d="M86 864 H122"/>
    <path d="M86 896 H122"/>
    <path d="M86 928 H122"/>
    <path d="M86 960 H122"/>
    <!-- spine .claude/skills (nivel 2) -->
    <path d="M150 498 V700"/>
    <path d="M150 508 H168"/><path d="M150 540 H168"/><path d="M150 572 H168"/><path d="M150 604 H168"/>
    <path d="M150 636 H168"/><path d="M150 668 H168"/><path d="M150 700 H168"/>
